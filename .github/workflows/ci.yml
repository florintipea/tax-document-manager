name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Do NOT set NODE_ENV=production here — npm ci omits devDependencies when
    # NODE_ENV is production, and the Next.js build needs @tailwindcss/postcss.
    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_SECRET: ci-nextauth-secret-at-least-32-characters-long
      ENCRYPTION_KEY: ci-encryption-key-at-least-32-characters
      NEXTAUTH_URL: http://127.0.0.1:3000
      APP_URL: http://127.0.0.1:3000
      TEST_PHASE_ENABLED: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Security audit (high)
        run: npm audit --audit-level=high
        continue-on-error: true
